spring:
  application:
    name: ledger
  datasource:
    url: jdbc:mysql://localhost:3306/finledger?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: admin@123

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080